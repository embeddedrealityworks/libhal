name: Docs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest
    container:
      image: embeddedreality/arm-llvm-toolchain:22

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Doxygen + Graphviz (dot) from Debian repo ────────────────────────────
      - name: Install doxygen and graphviz
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends doxygen graphviz

      # ── Asciidoctor + asciidoctor-diagram from RubyGems ─────────────────────
      - name: Install Ruby build dependencies
        run: apt-get install -y --no-install-recommends ruby ruby-dev build-essential

      - name: Install asciidoctor and asciidoctor-diagram
        run: gem install asciidoctor asciidoctor-diagram --no-document

      # ── Node.js LTS from NodeSource ──────────────────────────────────────────
      - name: Install Node.js LTS
        run: |
          apt-get install -y --no-install-recommends curl ca-certificates gnupg
          curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
          apt-get install -y nodejs

      # ── mermaid-cli from npm ─────────────────────────────────────────────────
      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      # ── Wrap mmdc so it runs without sandbox (required in containers) ────────
      #
      # asciidoctor-diagram calls `mmdc` directly with no way to forward
      # --puppeteerConfigFile, so we shadow the real binary with a wrapper
      # that always injects the config.
      - name: Configure mmdc for headless CI
        run: |
          cat > /tmp/puppeteer-ci.json <<'EOF'
          {
            "args": ["--no-sandbox", "--disable-setuid-sandbox"]
          }
          EOF

          REAL_MMC=$(command -v mmdc)
          cat > /usr/local/bin/mmdc <<EOF
          #!/bin/sh
          exec "$REAL_MMC" --puppeteerConfigFile /tmp/puppeteer-ci.json "\$@"
          EOF
          chmod +x /usr/local/bin/mmdc

      # ── Meson configure (properties required by top-level meson.build) ───────
      - name: Configure
        run: |
          meson setup builddir \
            --native-file cross/ci-native.txt \
            --cross-file  cross/ci-cross.txt  \
            --cross-file  cross/stm32f103.txt  \
            --cross-file  cross/cortex-m3_cross.txt

      # ── Build all documentation targets ──────────────────────────────────────
      - name: Build docs
        run: meson compile -C builddir docs

      # ── Upload built docs as a workflow artifact (main branch only) ──────────
      - name: Upload docs artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ github.sha }}
          path: |
            builddir/docs/doxygen/
            builddir/docs/manual/
          retention-days: 30
